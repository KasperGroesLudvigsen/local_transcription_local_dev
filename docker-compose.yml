version: '3.8'

services:
  transcription-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data  # Mount for audio files if needed
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - PYTHONPATH=/app
      - CUDA_VISIBLE_DEVICES=0
    stdin_open: true
    tty: true